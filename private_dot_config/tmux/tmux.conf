set-option -g default-terminal "tmux-256color"
set-environment -g COLORTERM "truecolor"
set-option -ga terminal-features ",*:RGB"
set-option -ga terminal-features ",*:hyperlinks"

# set-option a higher history limit
set-option -g history-limit 20000

# Enable OSC-52 clipboard integration. Every copy/paste from/to the tmux clipboard is forwarded to the terminal via OSC-52.
set-option -g set-clipboard on
set-option -g allow-passthrough on

# automatically renumber tmux windows
set-option -g renumber-windows on

# unbind default prefix and set-option it to Ctrl+a
unbind-key C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# for nested tmux sessions
bind-key a send-prefix

# Activity Monitoring
set-option -wg monitor-activity off
set-option -g visual-activity off

# Rather than constraining window size to the maximum size of any client
# connected to the *session*, constrain window size to the maximum size of any
# client connected to *that window*. Much more reasonable.
set-option -wg aggressive-resize off

# make delay shorter
set-option -sg escape-time 0

# tile all windows
unbind-key =
bind-key = select-layout tiled

# make window/pane index start with 1
set-option -g base-index 1
set-option -wg pane-base-index 1

set-option -g set-titles on
set-option -g set-titles-string "#T - #W"
set-option -wg automatic-rename on
set-option -g allow-rename off
set-option -g detach-on-destroy off

######################
#### Key Bindings ####
######################

# synchronize all panes in a window
bind-key y set-option -w synchronize-panes

# enable mouse support for switching panes/windows
set-option -wg mouse on

# set-option vi mode for copy mode
set-option -wg mode-keys vi

##############################
### Color & Style Settings ###
##############################

red="#f7768e"
orange="#ff9e64"
yellow="#e0af68"
green="#9ece6a"
teal="#73daca"
cyan="#2ac3de"
blue="#7aa2f7"
magenta="#bb9af7"
white="#c0caf5"
foreground="#a9b1d6"
comment="#565f89"
black="#414868"
storm_bg="#24283b"
night_bg="#1a1b26"

set-option -g status-left-length 32
set-option -g status-right-length 150
set-option -g status-interval 5
set-option -g status-position bottom

# default statusbar colors
set-option -g status-style fg=$foreground,bg=default,default

set-option -wg window-status-style fg=$comment,bg=default
set-option -wg window-status-format "  #I #W"

# active window title colors
set-option -wg window-status-current-style fg=$white,bg=default
set-option -wg window-status-current-format "   #[bold]#W"

# pane border colors
set-option -wg pane-active-border-style fg=$foreground
set-option -wg pane-border-style fg=$black

# message text
set-option -g message-style fg=$foreground,bg=default

# pane number display
set-option -g display-panes-active-colour $foreground
set-option -g display-panes-colour $comment

# clock
set-option -wg clock-mode-colour $blue

# status bar widgets
tm_session_name="#[default,bg=$blue,fg=$night_bg]   #S "
set-option -g status-left "$tm_session_name"

tm_host="#[fg=$blue,bg=default]   #h"
tm_date="#[default,bg=default,fg=$magenta]   %I:%M %p"
set-option -g status-right "#{prefix_highlight} $tm_gcert $tm_host $tm_date"

####################
### tmux Plugins ###
####################

# List of plugins
set-option -g @plugin 'tmux-plugins/tpm'
set-option -g @plugin 'tmux-plugins/tmux-sensible'
set-option -g @plugin 'tmux-plugins/tmux-pain-control'
set-option -g @plugin 'tmux-plugins/tmux-sessionist'
set-option -g @plugin 'tmux-plugins/tmux-resurrect'
set-option -g @plugin 'tmux-plugins/tmux-continuum'
set-option -g @plugin 'tmux-plugins/tmux-copycat'
set-option -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set-option -g @plugin 'omerxx/tmux-sessionx'
set-option -g @plugin 'omerxx/tmux-floax'

# Other examples:
# set-option -g @plugin 'github_username/plugin_name'
# set-option -g @plugin 'github_username/plugin_name#branch'
# set-option -g @plugin 'git@github.com:user/plugin'
# set-option -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run-shell '~/.tmux/plugins/tpm/tpm'

######################
#### Key Bindings ####
######################

bind-key N new-window -n "neovim" -c "#{pane_current_path}" "zsh -i -c 'nvim'"
